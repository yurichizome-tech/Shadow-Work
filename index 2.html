<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Grimoire</title>
    <style>
        :root { --bg: #0a0a0a; --card: #151515; --text: #d0d0d0; --glow: #4ade80; --accent: #ff0055; --gold: #d4af37; --blue: #3498db; }
        body { background: var(--bg); color: var(--text); font-family: 'Garamond', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .container { width: 90%; max-width: 500px; padding: 20px; text-align: center; }
        
        /* Sober Clock */
        .sober-box { margin: 20px 0; padding: 15px; border: 1px solid var(--glow); border-radius: 10px; background: rgba(0,0,0,0.5); cursor: pointer; }
        #timer-display { font-size: 2rem; color: var(--glow); font-weight: bold; }

        /* Sovereignty Tallies */
        .tally-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .tally-item { background: #1a1a2e; border: 1px solid var(--blue); padding: 15px; border-radius: 8px; cursor: pointer; position: relative; }
        .tally-item:active { transform: scale(0.95); background: #16213e; }
        .tally-count { font-size: 1.5rem; display: block; color: var(--blue); font-weight: bold; }

        /* Daily Rituals */
        .ritual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .ritual-item { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        .ritual-item.done { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }

        .panic-btn { width: 100%; background: #1a0505; border: 1px solid var(--accent); color: var(--accent); padding: 12px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .vault-gate { margin-top: 30px; color: #555; background: none; border: 1px solid #222; padding: 10px 20px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        
        textarea { width: 90%; height: 150px; background: #111; color: white; border: 1px solid #333; padding: 10px; margin-top: 20px; }
        input[type="password"], input[type="date"] { background: transparent; border: 1px solid #333; color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="sober-box" onclick="toggleDateSetter()">
            <div style="font-size: 0.7rem; letter-spacing: 2px;">SOVEREIGN FOR</div>
            <div id="timer-display">0d 0h 0m 0s</div>
            <div id="date-setter" class="hidden" style="margin-top:10px;">
                <input type="date" id="new-start-date">
                <button onclick="setSoberDate()">Set Date</button>
            </div>
        </div>

        <h3 style="color: var(--blue); letter-spacing: 2px;">SOVEREIGN TALLIES</h3>
        <div class="tally-grid">
            <div class="tally-item" onclick="addTally('saidNo')">
                <span id="count-saidNo" class="tally-count">0</span>
                Said "No"
            </div>
            <div class="tally-item" onclick="addTally('heldSilence')">
                <span id="count-heldSilence" class="tally-count">0</span>
                Held Silence
            </div>
            <div class="tally-item" onclick="addTally('noSorry')">
                <span id="count-noSorry" class="tally-count">0</span>
                "Sorry" Refused
            </div>
            <div class="tally-item" onclick="addTally('shWard')">
                <span id="count-shWard" class="tally-count">0</span>
                SH Ward Held
            </div>
        </div>

        <h3 style="color: var(--gold); letter-spacing: 2px;">DAILY RITUALS</h3>
        <div class="ritual-grid" id="rituals-container">
            </div>

        <div class="panic-tray">
            <button class="panic-btn" onclick="sendSignal('Matt')">SIGNAL MATT</button>
            <button class="panic-btn" onclick="sendSignal('Gramps')">SIGNAL GRAMPS</button>
            <button class="panic-btn" onclick="sendSignal('Ike')">SIGNAL IKE</button>
        </div>

        <button class="vault-gate" onclick="openGate()">[ ENTER THE VAULT ]</button>
    </div>

    <div id="gate-overlay" class="overlay hidden">
        <h2 style="color:#444;">SPEAK THE WORD</h2>
        <input type="password" id="gate-input" placeholder="Password">
        <button onclick="checkGate()" style="margin-top:20px;">Unlock</button>
    </div>

    <div id="vault-inner" class="overlay hidden">
        <div class="container">
            <button onclick="closeVault()">[ Close & Bolt ]</button>
            <h3>SHADOW LOG</h3>
            <textarea id="shadow-text" placeholder="What is the rot today?"></textarea>
            <button onclick="feedCrows()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; margin-top:20px;">FEED THE CROWS</button>
        </div>
    </div>

    <script>
        const WARD = "Klidous";
        const contacts = { 'Matt': '0000000000', 'Gramps': '0000000000', 'Ike': '0000000000' };
        
        let state = JSON.parse(localStorage.getItem('grimoireState')) || {
            soberDate: Date.now(),
            tallies: { saidNo: 0, heldSilence: 0, noSorry: 0, shWard: 0 },
            rituals: { Medication: false, Hydration: false, Stretches: false, Gratefulness: false, PeerSupport: false },
            lastReset: new Date().toDateString()
        };

        // Reset rituals daily
        if (state.lastReset !== new Date().toDateString()) {
            Object.keys(state.rituals).forEach(k => state.rituals[k] = false);
            state.lastReset = new Date().toDateString();
            save();
        }

        function save() { localStorage.setItem('grimoireState', JSON.stringify(state)); }

        // Clock logic
        setInterval(() => {
            let diff = Date.now() - state.soberDate;
            let d = Math.floor(diff / 86400000);
            let h = Math.floor((diff % 86400000) / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer-display').innerText = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        function toggleDateSetter() { document.getElementById('date-setter').classList.toggle('hidden'); }
        function setSoberDate() {
            const val = document.getElementById('new-start-date').value;
            if(val) { state.soberDate = new Date(val).getTime(); save(); toggleDateSetter(); }
        }

        // Tally Logic
        function addTally(key) {
            state.tallies[key]++;
            document.getElementById(`count-${key}`).innerText = state.tallies[key];
            save();
        }

        // Ritual Logic
        function renderRituals() {
            const container = document.getElementById('rituals-container');
            container.innerHTML = Object.keys(state.rituals).map(r => `
                <div class="ritual-item ${state.rituals[r] ? 'done' : ''}" onclick="toggleRitual('${r}')">${r}</div>
            `).join('');
        }

        function toggleRitual(r) {
            state.rituals[r] = !state.rituals[r];
            save();
            renderRituals();
        }

        function sendSignal(name) {
            const msg = `Signal: I need a check-in. (Grimoire)`;
            window.open(`sms:${contacts[name]}?body=${encodeURIComponent(msg)}`);
        }

        function openGate() { document.getElementById('gate-overlay').classList.remove('hidden'); }
        function checkGate() {
            if(document.getElementById('gate-input').value === WARD) {
                document.getElementById('gate-overlay').classList.add('hidden');
                document.getElementById('vault-inner').classList.remove('hidden');
            } else { alert("Access Denied."); }
        }
        function closeVault() { document.getElementById('vault-inner').classList.add('hidden'); document.getElementById('gate-input').value=""; }
        function feedCrows() {
            if(prompt("3-word Locking Incantation:")) {
                alert("The crows have scavenged your shadow.");
                document.getElementById('shadow-text').value = "";
                closeVault();
            }
        }

        // Init
        Object.keys(state.tallies).forEach(k => document.getElementById(`count-${k}`).innerText = state.tallies[k]);
        renderRituals();
    </script>
</body>
</html>

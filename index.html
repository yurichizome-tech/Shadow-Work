<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #b0b0b0; --accent: #ff3e3e; --gold: #c5a059; --green: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding-bottom: 50px; }
        .nav { display: flex; justify-content: center; gap: 20px; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .nav-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .container { width: 95%; max-width: 800px; margin: auto; padding-top: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        
        /* Tally Grid */
        .tally-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .tally-card { background: var(--panel); border: 1px solid #222; padding: 20px; text-align: center; cursor: pointer; }
        .count { display: block; font-size: 2rem; color: var(--green); }
        
        /* Project Tracker */
        .project-box { border: 1px solid #1a1a1a; background: #0a0a0a; padding: 15px; margin-bottom: 20px; }
        .proj-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; }
        .status-btn { background: #111; border: 1px solid #333; color: #555; padding: 5px 10px; cursor: pointer; font-size: 0.7rem; }
        .status-btn.active { color: var(--green); border-color: var(--green); }

        /* Log */
        .log-container { border-top: 2px solid #1a1a1a; padding-top: 20px; }
        #event-log { height: 150px; overflow-y: auto; font-size: 0.8rem; border-left: 1px solid #111; padding-left: 10px; }
        .log-entry { color: #666; margin-bottom: 4px; }
        .purge-btn { color: #200; font-size: 0.6rem; border: none; background: none; cursor: pointer; margin-top: 10px; }
        .purge-btn:hover { color: var(--accent); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="nav">
    <button class="nav-btn active" onclick="go('sovereign')">SOVEREIGNTY</button>
    <button class="nav-btn" onclick="go('projects')">PROJECTS</button>
    <button class="nav-btn" onclick="go('shadow')">SHADOW</button>
</div>

<div class="container">
    <div id="sovereign" class="view active">
        <div id="clock" style="font-size: 1.5rem; text-align: center; color: var(--gold); margin-bottom: 20px;">00:00:00</div>
        <div class="tally-grid">
            <div class="tally-card" onclick="logEvent('no', 'SAID NO')"><span id="v-no" class="count">0</span>NO</div>
            <div class="tally-card" onclick="logEvent('silence', 'SILENCE')"><span id="v-silence" class="count">0</span>SILENCE</div>
            <div class="tally-card" onclick="logEvent('sorry', 'NO SORRY')"><span id="v-sorry" class="count">0</span>SORRY</div>
            <div class="tally-card" onclick="logEvent('ward', 'WARD HELD')"><span id="v-ward" class="count">0</span>WARD</div>
        </div>
        <div class="log-container">
            <div id="event-log"></div>
            <button class="purge-btn" onclick="clearLog()">[ RESET DAILY LOG ]</button>
        </div>
    </div>

    <div id="projects" class="view">
        <div class="project-box">
            <div style="color:var(--gold); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px;">ACTIVE TRIAGE</div>
            <div class="proj-row"><span>Laundry Cycle</span><button class="status-btn" onclick="this.classList.toggle('active')">CLEANSED</button></div>
            <div class="proj-row"><span>Seedling Hydration</span><button class="status-btn" onclick="this.classList.toggle('active')">WATERED</button></div>
            <div class="proj-row"><span>Cupcake Batch</span><button class="status-btn" onclick="this.classList.toggle('active')">BAKED</button></div>
        </div>
    </div>

    <div id="shadow" class="view">
        <div id="vault-lock">
            <input type="password" id="passInput" placeholder="Speak the Word" style="background:#000; border:1px solid #222; color:#fff; text-align:center; padding:10px;">
            <button onclick="unlockVault()" style="color:#444; background:none; border:1px solid #222; padding:10px; cursor:pointer;">ENGAGE</button>
        </div>
        <div id="vault-content" class="hidden">
            <textarea id="void-text" placeholder="Release..."></textarea>
            <button onclick="burn()" style="width:100%; padding:20px; background:#200; color:var(--accent); border:1px solid var(--accent); cursor:pointer;">PURGE TO VOID</button>
        </div>
    </div>
</div>

<script>
    const PASS = "Kleidouchos";
    let state = JSON.parse(localStorage.getItem('sov_state')) || { no:0, silence:0, sorry:0, ward:0, start:Date.now() };
    let history = JSON.parse(localStorage.getItem('sov_history')) || [];

    function go(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(id.substring(0,3))));
        document.getElementById(id).classList.add('active');
        if(id !== 'shadow') { document.getElementById('vault-lock').classList.remove('hidden'); document.getElementById('vault-content').classList.add('hidden'); }
    }

    function unlockVault() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('vault-lock').classList.add('hidden');
            document.getElementById('vault-content').classList.remove('hidden');
        }
    }

    function logEvent(key, label) {
        state[key]++;
        localStorage.setItem('sov_state', JSON.stringify(state));
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        history.unshift(`[${time}] ${label}`);
        localStorage.setItem('sov_history', JSON.stringify(history));
        refresh();
    }

    function clearLog() {
        if(confirm("Confirm: Are you sure you want to purge the Daily Log?")) {
            history = [];
            localStorage.setItem('sov_history', JSON.stringify(history));
            refresh();
        }
    }

    function refresh() {
        ['no','silence','sorry','ward'].forEach(k => document.getElementById(`v-${k}`).innerText = state[k]);
        document.getElementById('event-log').innerHTML = history.map(e => `<div class="log-entry">${e}</div>`).join('');
    }

    setInterval(() => {
        let diff = Date.now() - state.start;
        document.getElementById('clock').innerText = new Date(diff).toISOString().substr(11, 8);
    }, 1000);

    window.onload = refresh;
</script>
</body>
</html>

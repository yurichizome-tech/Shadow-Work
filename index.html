<script>
    // Ensure the key matches exactly what you type
    const KEY = "Kleidouchos"; 
    
    let data = JSON.parse(localStorage.getItem('sov_vault_v1')) || {
        start: Date.now(),
        tallies: { no: 0, silence: 0, sorry: 0, ward: 0 }
    };

    function save() { localStorage.setItem('sov_vault_v1', JSON.stringify(data)); }

    function unlock() {
        const input = document.getElementById('pass').value.trim(); // .trim() removes accidental spaces
        if(input === KEY) {
            document.getElementById('lock-screen').style.display = 'none'; // Forced hide
            console.log("Gate Unlocked");
        } else {
            alert("The gate remains closed. Check your spelling.");
        }
    }

    // Force unlock with Enter key
    document.getElementById('pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { unlock(); }
    });

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        // This ensures the button you click stays highlighted
        event.currentTarget.classList.add('active'); 
    }

    function up(key) {
        data.tallies[key]++;
        document.getElementById(`c-${key}`).innerText = data.tallies[key];
        save();
    }

    function purge() {
        document.getElementById('void-input').value = "";
        alert("The offering is accepted.");
        showView('sovereign');
    }

    function updateClock() {
        let diff = Date.now() - data.start;
        let d = Math.floor(diff / 86400000);
        let h = Math.floor((diff % 86400000) / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);
        document.getElementById('clock').innerText = `${d}d ${h}h ${m}m ${s}s`;
    }

    setInterval(updateClock, 1000);
    
    // Initialize display values
    window.onload = function() {
        Object.keys(data.tallies).forEach(k => {
            const el = document.getElementById(`c-${k}`);
            if(el) el.innerText = data.tallies[k];
        });
    };
</script>

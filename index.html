<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #b0b0b0; --accent: #ff3e3e; --gold: #c5a059; --green: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Lock Screen */
        #lock-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        /* Navigation */
        .nav { display: flex; justify-content: center; gap: 20px; padding: 20px; border-bottom: 1px solid #1a1a1a; background: var(--bg); }
        .nav-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; padding: 10px; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* Content Areas */
        .container { width: 90%; max-width: 800px; margin: auto; padding-top: 20px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Stats */
        .tally-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .tally-card { background: var(--panel); border: 1px solid #222; padding: 20px; text-align: center; cursor: pointer; }
        .count { display: block; font-size: 2.5rem; color: var(--green); }

        /* The Void */
        textarea { width: 100%; height: 300px; background: #080000; color: var(--accent); border: 1px solid #300; padding: 15px; font-family: inherit; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h1 style="letter-spacing: 10px; color: #111;">KLEIDOUCHOS</h1>
    <input type="password" id="passInput" placeholder="Passkey" style="background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; text-align: center;">
    <button onclick="checkPass()" style="margin-top: 15px; padding: 10px 30px; background: #111; color: #444; border: 1px solid #222; cursor: pointer;">ENTER</button>
</div>

<div class="nav">
    <button id="btn-sov" class="nav-btn active" onclick="go('sovereign')">SOVEREIGNTY</button>
    <button id="btn-sha" class="nav-btn" onclick="go('shadow')">SHADOW</button>
</div>

<div class="container">
    <div id="sovereign" class="view active">
        <div id="clock" style="font-size: 2rem; text-align: center; color: var(--gold); margin-bottom: 20px;">00:00:00</div>
        <div class="tally-grid">
            <div class="tally-card" onclick="add('no')"><span id="v-no">0</span><br>SAID NO</div>
            <div class="tally-card" onclick="add('silence')"><span id="v-silence">0</span><br>SILENCE</div>
            <div class="tally-card" onclick="add('sorry')"><span id="v-sorry">0</span><br>NO SORRY</div>
            <div class="tally-card" onclick="add('ward')"><span id="v-ward">0</span><br>WARD</div>
        </div>
    </div>

    <div id="shadow" class="view">
        <textarea id="void-text" placeholder="Write the rot here..."></textarea>
        <button onclick="burn()" style="width:100%; padding: 20px; background: #200; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; margin-top: 10px;">PURGE</button>
    </div>
</div>

<script>
    const PASS = "Kleidouchos";
    let state = JSON.parse(localStorage.getItem('sov_state')) || { no: 0, silence: 0, sorry: 0, ward: 0, start: Date.now() };

    function checkPass() {
        const val = document.getElementById('passInput').value;
        if(val === PASS) {
            document.getElementById('lock-screen').classList.add('hidden');
            refresh();
        } else {
            alert("Locked.");
        }
    }

    function go(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById(id === 'sovereign' ? 'btn-sov' : 'btn-sha').classList.add('active');
    }

    function add(key) {
        state[key]++;
        localStorage.setItem('sov_state', JSON.stringify(state));
        refresh();
    }

    function burn() {
        document.getElementById('void-text').value = "";
        alert("Cleared.");
        go('sovereign');
    }

    function refresh() {
        document.getElementById('v-no').innerText = state.no;
        document.getElementById('v-silence').innerText = state.silence;
        document.getElementById('v-sorry').innerText = state.sorry;
        document.getElementById('v-ward').innerText = state.ward;
    }

    setInterval(() => {
        let d = new Date(Date.now() - state.start);
        document.getElementById('clock').innerText = d.toISOString().substr(11, 8);
    }, 1000);

    window.onload = refresh;
</script>
</body>
</html>

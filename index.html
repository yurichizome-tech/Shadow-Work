<style>
    /* Alchemical Transmutation Styles */
    .subtask { 
        padding: 8px; margin: 5px 0; border: 1px solid #222; 
        transition: all 0.5s ease; cursor: pointer; color: #888;
    }
    .subtask.completed { 
        color: #d4af37; border: 1px solid #d4af37; 
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        background: linear-gradient(45deg, #1a1a1a, #000);
        text-shadow: 0 0 5px #d4af37;
        animation: scorch 0.4s ease;
    }
    @keyframes scorch {
        0% { filter: brightness(1); border-color: #fff; }
        50% { filter: brightness(3); border-color: #fff; box-shadow: 0 0 20px #fff; }
        100% { filter: brightness(1); border-color: #d4af37; }
    }

    /* The Feast of Crows Animation */
    @keyframes flyOff {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: translateY(-500px) translateX(200px) rotate(20deg) scale(0); opacity: 0; }
    }
    .crow-particle { 
        position: absolute; width: 10px; height: 10px; background: black; 
        clip-path: polygon(0% 20%, 50% 50%, 100% 20%, 50% 100%);
        animation: flyOff 1.5s forwards;
    }
</style>

<script>
    function feedCrows() {
        const area = document.getElementById('shadow-text');
        if (!area.value) return;
        
        // Visual: Create 20 "Crows" that fly away
        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.className = 'crow-particle';
            p.style.left = (area.offsetLeft + Math.random() * area.offsetWidth) + 'px';
            p.style.top = (area.offsetTop + Math.random() * area.offsetHeight) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1500);
        }
        
        area.style.transition = "opacity 1s";
        area.style.opacity = "0";
        setTimeout(() => {
            area.value = "";
            area.style.opacity = "1";
            closeVault();
        }, 1200);
    }
</script>

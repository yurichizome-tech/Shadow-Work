<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault</title>
    <style>
        :root { --bg: #050505; --gold: #c5a059; --green: #4ade80; --accent: #ff3e3e; }
        body { background: var(--bg); color: #b0b0b0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        
        /* Nav */
        .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* Momentum */
        #bar-bg { background: #111; height: 12px; width: 100%; max-width: 600px; border: 1px solid #222; margin: 20px auto; border-radius: 10px; overflow: hidden; }
        #bar-fill { background: linear-gradient(90deg, var(--gold), var(--green)); height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); }

        /* Tally */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: auto; }
        .card { background: #111; border: 1px solid #222; padding: 20px; cursor: pointer; border-radius: 8px; }
        .card:active { transform: scale(0.95); border-color: var(--green); }
        .count { display: block; font-size: 2rem; color: var(--green); font-weight: bold; }

        /* View Control */
        .view { display: none; max-width: 600px; margin: auto; text-align: left; }
        .view.active { display: block; }

        /* Projects & Input */
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }
        .item { background: #080808; padding: 15px; border-left: 3px solid var(--gold); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Log */
        #log { margin-top: 30px; height: 150px; overflow-y: auto; font-size: 0.8rem; color: #666; text-align: left; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="go('sov')" id="n-sov" class="nav-btn active">SOVEREIGNTY</button>
        <button onclick="go('prj')" id="n-prj" class="nav-btn">PROJECTS</button>
        <button onclick="go('sha')" id="n-sha" class="nav-btn">SHADOW</button>
    </div>

    <h2 id="clock">00:00:00</h2>
    <div id="bar-bg"><div id="bar-fill"></div></div>

    <div id="v-sov" class="view active">
        <div class="grid">
            <div class="card" onclick="hit('NO')"><span id="c-no">0</span>NO</div>
            <div class="card" onclick="hit('SILENCE')"><span id="c-sil">0</span>SILENCE</div>
            <div class="card" onclick="hit('SORRY')"><span id="c-sor">0</span>NO SORRY</div>
            <div class="card" onclick="hit('WARD')"><span id="c-war">0</span>WARD</div>
        </div>
        <div id="log"></div>
    </div>

    <div id="v-prj" class="view">
        <input type="text" id="p-task" placeholder="Task Name...">
        <input type="text" id="p-cat" placeholder="Category (Garden, Kitchen...)" style="width: 60%;">
        <button onclick="addP()" style="padding: 10px; background: var(--gold); border:none; cursor:pointer; font-weight:bold; width:35%;">ADD</button>
        <div id="p-list" style="margin-top: 20px;"></div>
    </div>

    <div id="v-sha" class="view">
        <div id="lock">
            <input type="password" id="pass" placeholder="Speak the Word" style="text-align:center;">
            <button onclick="unlock()" style="width:100%; padding:10px; background:#111; color:#555; border:1px solid #333; cursor:pointer;">ENGAGE</button>
        </div>
        <div id="vault" class="hidden">
            <textarea id="rot" placeholder="Is this rot yours?"></textarea>
            <button onclick="burn()" style="width:100%; padding:20px; background:#200; color:var(--accent); border:1px solid var(--accent); cursor:pointer; font-weight:bold;">PURGE</button>
        </div>
    </div>

<script>
    // 1. Data Setup
    let counts = { NO: 0, SILENCE: 0, SORRY: 0, WARD: 0 };
    let projects = [];
    let start = Date.now();

    // 2. Navigation
    function go(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
        if(id !== 'sha') {
            document.getElementById('lock').classList.remove('hidden');
            document.getElementById('vault').classList.add('hidden');
        }
    }

    // 3. Tally Logic (The working part)
    function hit(type) {
        let reason = prompt("Context for " + type + ":", "");
        counts[type]++;
        
        // Update Display
        document.getElementById('c-no').innerText = counts.NO;
        document.getElementById('c-sil').innerText = counts.SILENCE;
        document.getElementById('c-sor').innerText = counts.SORRY;
        document.getElementById('c-war').innerText = counts.WARD;

        // Log
        let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let entry = document.createElement('div');
        entry.innerHTML = `<span style="color:var(--gold)">[${time}]</span> ${type}: ${reason || 'Held'}`;
        document.getElementById('log').prepend(entry);

        // Momentum Bar
        let total = counts.NO + counts.SILENCE + counts.SORRY + counts.WARD;
        document.getElementById('bar-fill').style.width = Math.min((total / 15) * 100, 100) + "%";
    }

    // 4. Projects
    function addP() {
        let t = document.getElementById('p-task').value;
        let c = document.getElementById('p-cat').value || "TRIAGE";
        if(t) {
            projects.push({task: t, cat: c});
            renderP();
            document.getElementById('p-task').value = "";
        }
    }

    function renderP() {
        document.getElementById('p-list').innerHTML = projects.map((p, i) => `
            <div class="item">
                <div><small style="color:var(--gold)">${p.cat}</small><br>${p.task}</div>
                <button onclick="projects.splice(${i},1); renderP();" style="background:none; border:none; color:#300; cursor:pointer;">[X]</button>
            </div>
        `).join('');
    }

    // 5. Shadow
    function unlock() {
        if(document.getElementById('pass').value === "Kleidouchos") {
            document.getElementById('lock').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
        }
    }

    function burn() {
        document.getElementById('rot').value = "";
        alert("Purged.");
        go('sov');
    }

    // 6. Clock
    setInterval(() => {
        let diff = new Date(Date.now() - start);
        document.getElementById('clock').innerText = diff.toISOString().substr(11, 8);
    }, 1000);
</script>
</body>
</html>

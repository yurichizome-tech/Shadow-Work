<main id="content">
        <div id="garden" class="branch-content" style="display:none;"></div>
        <div id="torches" class="branch-content" style="display:none;"></div>
        <div id="vault" class="branch-content" style="display:none;"></div>
        <div id="void" class="branch-content" style="display:none;"></div>
    </main>

    <script src="garden.js"></script>
    <script src="torches.js"></script>
    <script src="vault.js"></script>
    <script src="void.js"></script>

    <script>
        function openBranch(branchId) {
            // 1. Hide everything
            const sections = document.querySelectorAll('.branch-content');
            sections.forEach(s => s.style.display = 'none');
            
            // 2. Show the specific tab
            const target = document.getElementById(branchId);
            if (target) { 
                target.style.display = 'block'; 
                
                // 3. Wake up the code for that tab
                if (branchId === 'torches' && typeof refreshTorches === 'function') {
                    refreshTorches();
                }
                if (branchId === 'garden' && typeof refreshGarden === 'function') {
                    refreshGarden();
                }
                    if (branchId === 'vault' && typeof refreshVault === 'function') {
                         refreshVault();
                    }
                    if (branchId === 'void' && typeof refreshVoid === 'function') {
                        refreshVoid();
                    }
            }
            
            // 4. Make the button glow
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
        }

        // Default to the Garden view on startup
        window.onload = () => { 
            openBranch('garden'); 
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calligo - Torches & Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-glow { box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); border-color: rgba(212, 175, 55, 0.5); }
        .red-hold { background: rgba(220, 38, 38, 0.2); border: 2px solid #dc2626; transition: all 0.2s; }
        .red-hold:active { background: #dc2626; transform: scale(0.95); }
        .log-entry { font-family: 'Courier New', monospace; font-size: 0.85rem; border-left: 2px solid #d4af37; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto mb-8">
        <div class="flex justify-between mb-2 px-1 text-sm">
            <span class="text-yellow-500">Sovereignty</span>
            <span id="progress-text">5%</span>
        </div>
        <div class="w-full bg-gray-800 rounded-full h-4 overflow-hidden border border-gray-700">
            <div id="vbo-bar" class="bg-gradient-to-r from-yellow-600 via-purple-600 to-green-600 h-full transition-all duration-500" style="width: 5%"></div>
        </div>
    </div>

    <div class="max-w-md mx-auto grid grid-cols-2 gap-4 mb-8">
        <button onclick="logTally('The Ward')" class="glass p-4 rounded-xl gold-glow active:scale-95 transition">Hold the Ward</button>
        <button onclick="logTally('Silence Held')" class="glass p-4 rounded-xl active:scale-95 transition">Silence Held</button>
        <button onclick="triggerUrge()" class="glass p-4 rounded-xl border-orange-900 active:scale-95 transition text-orange-400">Log Urge</button>
        <button onclick="logTally('No!')" class="glass p-4 rounded-xl active:scale-95 transition font-bold">"No!"</button>
    </div>

    <div class="max-w-md mx-auto glass rounded-2xl p-4 h-64 flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xs uppercase tracking-widest text-gray-400">The Ledger</h3>
            <button id="reset-btn" onmousedown="startReset()" onmouseup="cancelReset()" onmouseleave="cancelReset()" class="red-hold px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-tighter">Hold to Reset</button>
        </div>
        <div id="log-list" class="flex-1 overflow-y-auto space-y-2 pr-2">
            </div>
    </div>

    <script>
        let urgeCount = 0;
        let lastUrgeTime = 0;

        function logTally(type) {
            const reason = prompt(`Reason for ${type}? (Optional)`) || "No specifics provided.";
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            addEntry(timestamp, type, reason);
        }

        function triggerUrge() {
            const intensity = prompt("Intensity (1-10)?");
            const now = Date.now();
            
            // Frequency Logic
            if (now - lastUrgeTime < 3600000) urgeCount++; else urgeCount = 1;
            lastUrgeTime = now;

            if (intensity >= 7 || urgeCount >= 3) {
                alert("Messenger Crow sent to Matt: 'Vibe check needed.'");
            }

            logTally(`URGE [Lv.${intensity}]`);
        }

        function addEntry(time, type, reason) {
            const logList = document.getElementById('log-list');
            const entry = document.createElement('div');
            entry.className = "log-entry bg-black/40 p-2 rounded ml-1";
            entry.innerHTML = `<span class="text-gray-500">[${time}]</span> <span class="text-yellow-600 font-bold">${type}</span><br><span class="text-gray-400 italic">${reason}</span>`;
            logList.prepend(entry);
        }

        let resetTimer;
        function startReset() {
            resetTimer = setTimeout(() => {
                if(confirm("Limit Reached at 95%. System in Survival Mode. Reset required? (SMS will be sent)")) {
                    document.getElementById('log-list').innerHTML = '';
                    document.getElementById('vbo-bar').style.width = '0%';
                    document.getElementById('progress-text').innerText = '0%';
                    alert("SMS Sent to Matt: 'Survival Mode Engaged. Resetting.'");
                }
            }, 3000);
        }

        function cancelReset() { clearTimeout(resetTimer); }
    </script>
</body>
</html>

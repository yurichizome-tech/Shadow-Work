<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Grimoire</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --purple: #8a2be2; --green: #2e8b57; --text: #d0d0d0; }
        body { background: var(--bg); color: var(--text); font-family: 'Garamond', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; overflow-x: hidden; }
        
        /* VBO (PROGRESS BAR) */
        .vbo-container { width: 100%; height: 8px; background: #111; position: fixed; top: 0; z-index: 3000; }
        #vbo-bar { height: 100%; width: 0%; background: linear-gradient(to right, var(--green), var(--purple), var(--gold)); box-shadow: 0 0 15px var(--gold); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* NAV */
        .nav-bar { display: flex; justify-content: space-around; width: 100%; background: #0a0a0a; padding: 20px 0; border-bottom: 1px solid #111; margin-top: 8px; }
        .nav-btn { background: none; border: none; color: #444; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        .nav-btn.active { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        .view { width: 92%; max-width: 600px; display: none; padding-top: 20px; }
        .view.active { display: block; }

        /* TORCHES */
        .torch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .torch-card { background: #0d0d0d; border: 1px solid #222; padding: 20px; border-radius: 5px; text-align: center; cursor: pointer; }
        .torch-count { font-size: 1.8rem; color: var(--gold); display: block; font-weight: bold; }

        /* MY GARDEN */
        .task-group { border: 1px solid #1a1a1a; padding: 20px; margin-bottom: 25px; position: relative; transition: 0.5s; }
        .task-header { font-size: 1.1rem; letter-spacing: 3px; color: #555; transition: 0.8s; }
        .group-controls { position: absolute; right: 10px; top: 10px; display: flex; flex-direction: column; }
        .order-btn { background: none; border: none; color: #333; cursor: pointer; font-size: 1.2rem; }
        
        /* ALCHEMICAL GLOW */
        .task-group.ready { 
            border-color: var(--gold); 
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2), inset 0 0 15px rgba(46, 139, 87, 0.2); 
        }
        .task-group.ready .task-header { 
            color: var(--gold); 
            text-shadow: 0 0 10px var(--gold), 2px 2px 5px var(--purple); 
        }

        .subtask { padding: 15px; margin: 10px 0; border: 1px solid #222; background: #050505; color: #666; cursor: pointer; }
        .subtask.completed { color: var(--text); border-color: #444; background: #111; }

        .offering-btn { display: none; width: 100%; padding: 10px; margin-top: 10px; background: none; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: serif; letter-spacing: 2px; }
        .task-group.ready .offering-btn { display: block; animation: pulse 2s infinite; }

        /* VAULT & CORRIDOR */
        .vault-gate { text-align: center; padding-top: 60px; }
        .key-input { background: #000; border: 1px solid #222; color: var(--gold); padding: 15px; width: 70%; text-align: center; margin-bottom: 20px; }
        .keyhole-btn { width: 50px; height: 80px; background: var(--gold); clip-path: polygon(50% 0%, 100% 30%, 100% 70%, 70% 70%, 70% 100%, 30% 100%, 30% 70%, 0% 70%, 0% 30%); border: none; cursor: pointer; margin: 0 auto; display: block; }

        .void-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        #corridor-msg { display: none; color: var(--gold); letter-spacing: 5px; animation: fadeOut 3s forwards; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes fadeOut { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="vbo-container"><div id="vbo-bar"></div></div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showView('torches')">TORCHES</button>
        <button class="nav-btn" onclick="showView('garden')">MY GARDEN</button>
        <button class="nav-btn" onclick="showView('gate')">VAULT</button>
    </div>

    <div id="torches" class="view active">
        <div class="torch-grid">
            <div class="torch-card" onclick="addTally('no')"><span id="t-no" class="torch-count">0</span>No!</div>
            <div class="torch-card" onclick="addTally('silence')"><span id="t-silence" class="torch-count">0</span>Silence Held</div>
            <div class="torch-card" onclick="addTally('ward')"><span id="t-ward" class="torch-count">0</span>Held the Ward</div>
            <div class="torch-card" onclick="addTally('voices')"><span id="t-voices" class="torch-count">0</span>Urged by voices...</div>
        </div>
    </div>

    <div id="garden" class="view">
        <div id="garden-list">
            <div class="task-group" id="g-laundry">
                <div class="group-controls">
                    <button class="order-btn" onclick="move(this, -1)">▲</button>
                    <button class="order-btn" onclick="move(this, 1)">▼</button>
                </div>
                <div class="task-header">Laundry</div>
                <div class="subtask" onclick="checkSub(this)">Wash & Rinse</div>
                <div class="subtask" onclick="checkSub(this)">The Hanging</div>
                <div class="subtask" onclick="checkSub(this)">Fold & Center</div>
                <button class="offering-btn" onclick="sendOffering('g-laundry')">SEND OFFERING</button>
            </div>
            <div class="task-group" id="g-cupcakes">
                <div class="group-controls">
                    <button class="order-btn" onclick="move(this, -1)">▲</button>
                    <button class="order-btn" onclick="move(this, 1)">▼</button>
                </div>
                <div class="task-header">Cupcakes</div>
                <div class="subtask" onclick="checkSub(this)">The Mixing</div>
                <div class="subtask" onclick="checkSub(this)">Fire & Bake</div>
                <div class="subtask" onclick="checkSub(this)">Decoration</div>
                <button class="offering-btn" onclick="sendOffering('g-cupcakes')">SEND OFFERING</button>
            </div>
        </div>
    </div>

    <div id="gate" class="view vault-gate">
        <p style="color: #222; letter-spacing: 4px;">Speak the words...</p>
        <input type="password" id="pass-box" class="key-input">
        <button class="keyhole-btn" onclick="enterVault()"></button>
    </div>

    <div id="void-overlay" class="void-overlay">
        <div id="void-content" style="width:100%; text-align:center;">
            <h2 style="color: #111; letter-spacing: 12px;">THE VOID</h2>
            <textarea id="void-text" placeholder="Release..."></textarea><br>
            <button onclick="ritualExit()" style="background:none; border:1px solid #222; color:#222; padding:15px 40px; cursor:pointer;">CLEANSE & LOCK</button>
        </div>
        <div id="corridor-msg">WALKING THE CORRIDOR...</div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('sov_v68')) || { prog: 0, tallies: {no:0, silence:0, ward:0, voices:0} };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addTally(key) {
            state.tallies[key]++;
            state.prog += 1;
            updateUI();
        }

        function checkSub(el) {
            el.classList.toggle('completed');
            const group = el.parentElement;
            const total = group.querySelectorAll('.subtask').length;
            const done = group.querySelectorAll('.subtask.completed').length;
            if(total === done) group.classList.add('ready');
            else group.classList.remove('ready');
        }

        function sendOffering(id) {
            state.prog += 10;
            document.getElementById(id).remove();
            updateUI();
        }

        function move(btn, dir) {
            const el = btn.closest('.task-group');
            if(dir === -1 && el.previousElementSibling) el.parentNode.insertBefore(el, el.previousElementSibling);
            if(dir === 1 && el.nextElementSibling) el.parentNode.insertBefore(el.nextElementSibling, el);
        }

        function updateUI() {
            document.getElementById('vbo-bar').style.width = Math.min(state.prog, 100) + '%';
            for(let key in state.tallies) {
                if(document.getElementById(`t-${key}`)) document.getElementById(`t-${key}`).innerText = state.tallies[key];
            }
            localStorage.setItem('sov_v68', JSON.stringify(state));
        }

        function enterVault() {
            if(document.getElementById('pass-box').value.toLowerCase() === "kleidouchos") {
                document.getElementById('void-overlay').style.display = 'flex';
                document.getElementById('pass-box').value = "";
            }
        }

        function ritualExit() {
            document.getElementById('void-content').style.display = 'none';
            document.getElementById('corridor-msg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('void-overlay').style.display = 'none';
                document.getElementById('void-content').style.display = 'block';
                document.getElementById('corridor-msg').style.display = 'none';
                document.getElementById('void-text').value = "";
                showView('torches');
            }, 3000);
        }

        updateUI();
    </script>
</body>
</html>

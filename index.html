<script>
    // ... (Navigation and Unlock logic remains the same)

    function logEvent(key, label) {
        // NEW: Ask for details
        const detail = prompt(`Optional: Add context to this ${label}:`, "");
        const finalLabel = detail ? `${label}: ${detail}` : label;

        state[key]++;
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        history.unshift(`[${time}] ${finalLabel}`);
        
        if(history.length > 30) history.pop();
        saveAndRefresh();
    }

    function addProject() {
        const input = document.getElementById('newProj');
        const category = prompt("Enter Category (e.g., Home, Garden, Kitchen):", "General");
        
        if(input.value.trim() !== "") {
            chores.push({ task: input.value.trim(), cat: category, done: false });
            input.value = "";
            saveAndRefresh();
        }
    }

    function refreshUI() {
        // Update Tallies
        ['no','silence','sorry','ward'].forEach(k => document.getElementById(`v-${k}`).innerText = state[k]);
        
        // Update Log
        document.getElementById('event-log').innerHTML = history.map(e => `<div>${e}</div>`).join('');
        
        // Update Project List with Categories
        document.getElementById('proj-list').innerHTML = chores.map((c, i) => `
            <div class="proj-row">
                <div>
                    <small style="color:var(--gold); display:block; font-size:0.6rem;">${c.cat.toUpperCase()}</small>
                    <span style="${c.done ? 'text-decoration:line-through; color:#444' : ''}">${c.task}</span>
                </div>
                <div>
                    <button class="status-btn ${c.done ? 'done' : ''}" onclick="toggleDone(${i})">${c.done ? 'DONE' : 'DO'}</button>
                    <button class="status-btn" onclick="removeProject(${i})" style="color:#300; border:none;">[X]</button>
                </div>
            </div>
        `).join('');
    }

    function toggleDone(index) {
        chores[index].done = !chores[index].done;
        saveAndRefresh();
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Grimoire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bar-bg"><div id="bar-fill"></div></div>
    <h2 id="clock">00:00:00</h2>

    <nav class="nav-bar">
        <button class="nav-btn" onclick="openBranch('garden')">MY GARDEN</button>
        <button class="nav-btn" onclick="openBranch('torches')">TORCHES</button>
        <button class="nav-btn" onclick="openBranch('vault')">THE VAULT</button>
        <button class="nav-btn" onclick="openBranch('void')">THE VOID</button>
    </nav>

  <main id="content">
        <div id="garden" class="branch-content" style="display:none;">Loading Garden...</div>
        <div id="torches" class="branch-content" style="display:none;">Loading Torches...</div>
        <div id="vault" class="branch-content" style="display:none;">Loading Vault Gate...</div>
        <div id="void" class="branch-content" style="display:none;">Loading The Void...</div>
    </main>

<script src="torches.js"></script>
    <script src="garden.js"></script>
    <script src="vault.js"></script>
    <script src="void.js"></script>

    <script>
        function openBranch(branchId) {
            console.log("Switching to branch: " + branchId); // Diagnostic
            
            // Hide all sections
            const sections = document.querySelectorAll('.branch-content');
            sections.forEach(s => s.style.display = 'none');
            
            // Show the target section
            const target = document.getElementById(branchId);
            if (target) { 
                target.style.display = 'block'; 
                
                // Specific wake-up calls for each branch
                if (branchId === 'torches') {
                    if (typeof refreshTorches === 'function') {
                        refreshTorches();
                    } else {
                        target.innerHTML = "<p style='color:red;'>Error: torches.js not loaded yet.</p>";
                    }
                }
            }
            
            // Update button UI
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
        }

        // Wait for everything to load before starting
        window.onload = () => { 
            console.log("Grimoire Loaded.");
            openBranch('torches'); 
        };
    </script>
</body>
</html>

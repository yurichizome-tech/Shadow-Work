<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grimoire Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="main-tabs">
        <button onclick="openBranch('garden')">My Garden</button>
        <button onclick="openBranch('torches')">Torches</button>
        <button onclick="openBranch('vault')">Locked Vault</button>
        <button onclick="openBranch('void')">The Void</button>
    </nav>

    <main id="content-display">
          <div id="garden" class="branch-content">
            <h2>My Garden</h2>
            <div class="garden-controls">
                </div>
            <ul id="task-list" class="garden-list">
                </ul>
        </div>


        
        </main>

    <script src="garden.js"></script>
    <script src="torches.js"></script>
    <script src="vault.js"></script>
    <script src="void.js"></script>

    <script>
function openBranch(branchId) {
    // Hide all branches
    const branches = document.querySelectorAll('.branch-content');
    branches.forEach(b => b.style.display = 'none');

    // Show the selected branch
    const target = document.getElementById(branchId);
    if (target) {
        target.style.display = 'block';
    }
}
</script>

  <div id="torches" class="branch-content" style="display:none;">
    <h2>The Torches</h2>
    <div class="torch-item">
        <button onclick="tally(1)">🔥 Torch 1</button>
        <span id="torch-count-1">0</span>
    </div>
    </div>


            <div id="garden" class="branch-content">
            <h2>My Garden</h2>
            <div class="garden-controls">
                </div>
            <ul id="task-list" class="garden-list">
                </ul>
        </div>


    
        <div id="vault" class="branch-content" style="display:none;">
        <h2 id="vault-lock-msg">🔒 Vault Locked</h2>
        <button onclick="toggleVault()">Attempt Unlock</button>
        <div id="vault-content" style="display:none; margin-top:20px;">
            <p>Your secret treasures and private notes go here.</p>
        </div>
    </div>

    <div id="void" class="branch-content" style="display:none;">
        <h2>The Void</h2>
        <button onclick="enterTheVoid()">Meditate</button>
    </div>

    <script src="garden.js"></script>
    <script src="torches.js"></script>
    <script src="vault.js"></script>
    <script src="void.js"></script>

    
</body>
</html>

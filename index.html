<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Vault</title>
    <style>
        :root { --bg: #050505; --gold: #c5a059; --green: #4ade80; }
        body { background: var(--bg); color: #b0b0b0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        #bar-bg { background: #111; height: 12px; width: 100%; max-width: 600px; border: 1px solid #222; margin: 15px auto; border-radius: 10px; overflow: hidden; }
        #bar-fill { background: linear-gradient(90deg, var(--gold), var(--green)); height: 100%; width: 0%; transition: 0.5s; }
        .view { display: none; max-width: 600px; margin: auto; text-align: left; }
        .view.active { display: block; }
        .card { background: #111; border: 1px solid #222; padding: 20px; cursor: pointer; border-radius: 8px; margin: 5px; display: inline-block; width: 45%; box-sizing: border-box; text-align: center; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 10px; font-family: inherit; }
        .start-btn { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; color: #000; }
        .item-row { background: #0a0a0a; padding: 15px; border-left: 3px solid var(--gold); margin-top: 15px; border-radius: 4px; }
        .sub { font-size: 0.8rem; color: #666; margin: 8px 0 0 15px; cursor: pointer; }
        .sub.done { color: var(--green); text-decoration: line-through; }
    </style>
</head>
<body>
    <div class="nav">
        <button onclick="go('sov')" id="n-sov" class="nav-btn active">SOVEREIGNTY</button>
        <button onclick="go('prj')" id="n-prj" class="nav-btn">PROJECTS</button>
        <button onclick="go('sha')" id="n-sha" class="nav-btn">SHADOW</button>
    </div>

    <h2 id="clock" style="color:var(--gold)">00:00:00</h2>
    <div id="bar-bg"><div id="bar-fill"></div></div>

    <div id="v-sov" class="view active">
        <div class="card" onclick="hit('NO')"><span id="c-no" style="color:var(--green); font-size:1.5rem; display:block;">0</span>NO</div>
        <div class="card" onclick="hit('SILENCE')"><span id="c-sil" style="color:var(--green); font-size:1.5rem; display:block;">0</span>SILENCE</div>
        <div class="card" onclick="hit('SORRY')"><span id="c-sor" style="color:var(--green); font-size:1.5rem; display:block;">0</span>NO SORRY</div>
        <div class="card" onclick="hit('WARD')"><span id="c-war" style="color:var(--green); font-size:1.5rem; display:block;">0</span>WARD</div>
        <div id="log" style="margin-top:20px; font-size:0.8rem; color:#444;"></div>
    </div>

    <div id="v-prj" class="view">
        <input type="text" id="p-input" placeholder="New Cycle (e.g. Baking)">
        <button class="start-btn" onclick="addP()">START CYCLE</button>
        <div id="p-list"></div>
    </div>

    <div id="v-sha" class="view">
        <input type="password" id="pass" placeholder="Password" style="text-align:center;">
        <button onclick="unlock()" class="start-btn" style="background:#111; color:#555;">ENGAGE</button>
        <div id="v-box" class="active" style="display:none; margin-top:20px;">
            <textarea id="rot" style="width:100%; height:200px; background:#000; color:red; border:1px solid red; padding:10px;"></textarea>
            <button onclick="burn()" class="start-btn" style="background:#200; color:#fff; margin-top:10px;">PURGE</button>
        </div>
    </div>

<script>
    let state = JSON.parse(localStorage.getItem('sov_v3')) || { counts: {NO:0, SILENCE:0, SORRY:0, WARD:0}, projs: [], logs: [] };
    let start = Date.now();

    function go(r) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + r).classList.add('active');
        document.getElementById('n-' + r).classList.add('active');
    }

    function hit(t) {
        let r = prompt("Context:", "");
        state.counts[t]++;
        state.logs.unshift("[" + new Date().toLocaleTimeString() + "] " + t + ": " + (r || "Held"));
        save();
    }

    function addP() {
        let val = document.getElementById('p-input').value;
        if(val) {
            state.projs.push({name: val, subs: []});
            document.getElementById('p-input').value = "";
            save();
        }
    }

    function addS(i) {
        let s = prompt("Sub-task:");
        if(s) { state.projs[i].subs.push({t: s, d: false}); save(); }
    }

    function tog(pi, si) { state.projs[pi].subs[si].d = !state.projs[pi].subs[si].d; save(); }
    function del(i) { state.projs.splice(i, 1); save(); }
    function unlock() { if(document.getElementById('pass').value === "Kleidouchos") document.getElementById('v-box').style.display = "block"; }
    function burn() { document.getElementById('rot').value = ""; alert("Purged."); go('sov'); }

    function save() {
        localStorage.setItem('sov_v3', JSON.stringify(state));
        render();
    }

    function render() {
        document.getElementById('c-no').innerText = state.counts.NO;
        document.getElementById('c-sil').innerText = state.counts.SILENCE;
        document.getElementById('c-sor').innerText = state.counts.SORRY;
        document.getElementById('c-war').innerText = state.counts.WARD;
        let total = state.counts.NO + state.counts.SILENCE + state.counts.SORRY + state.counts.WARD;
        document.getElementById('bar-fill').style.width = Math.min((total / 10) * 100, 100) + "%";
        document.getElementById('log').innerHTML = state.logs.slice(0, 10).map(l => `<div>${l}</div>`).join('');
        document.getElementById('p-list').innerHTML = state.projs.map((p, i) => `
            <div class="item-row">
                <strong>${p.name}</strong>
                ${p.subs.map((s, si) => `<div class="sub ${s.d ? 'done' : ''}" onclick="tog(${i},${si})">- ${s.t}</div>`).join('')}
                <div style="margin-top:10px;">
                    <button onclick="addS(${i})">+ Sub</button>
                    <button onclick="del(${i})" style="color:red; margin-left:10px;">Delete</button>
                </div>
            </div>
        `).join('');
    }

    setInterval(() => {
        let d = new Date(Date.now() - start);
        document.getElementById('clock').innerText = d.toISOString().substr(11, 8);
    }, 1000);
    render();
</script>
</body>
</html>

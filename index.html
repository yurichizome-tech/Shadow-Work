<!DOCTYPE html>
<html>
<head>
    <title>Vault Reset</title>
    <style>
        body { background: #000; color: #ccc; font-family: monospace; padding: 20px; }
        .btn { background: #111; border: 1px solid #333; color: #gold; padding: 20px; margin: 5px; cursor: pointer; display: inline-block; width: 45%; text-align: center; }
        #bar-bg { background: #111; height: 10px; width: 100%; border: 1px solid #222; margin: 20px 0; }
        #bar-fill { background: gold; height: 100%; width: 0%; transition: 0.3s; }
        #log { border-top: 1px solid #222; margin-top: 20px; padding-top: 10px; font-size: 12px; height: 200px; overflow-y: scroll; }
    </style>
</head>
<body>

    <div style="text-align:center;">
        <h2 id="clock">00:00:00</h2>
        <div id="bar-bg"><div id="bar-fill"></div></div>
    </div>

    <div class="btn" onclick="hit('NO')">NO: <span id="c-no">0</span></div>
    <div class="btn" onclick="hit('SILENCE')">SILENCE: <span id="c-sil">0</span></div>
    <div class="btn" onclick="hit('SORRY')">NO SORRY: <span id="c-sor">0</span></div>
    <div class="btn" onclick="hit('WARD')">WARD: <span id="c-war">0</span></div>

    <div id="log"></div>

<script>
    // Simplified State
    let count = { NO: 0, SILENCE: 0, SORRY: 0, WARD: 0 };
    let start = Date.now();

    function hit(type) {
        // 1. Ask for reason
        let reason = prompt("Why " + type + "?", "");
        
        // 2. Update numbers
        count[type]++;
        document.getElementById('c-no').innerText = count['NO'];
        document.getElementById('c-sil').innerText = count['SILENCE'];
        document.getElementById('c-sor').innerText = count['SORRY'];
        document.getElementById('c-war').innerText = count['WARD'];

        // 3. Update Log
        let time = new Date().toLocaleTimeString();
        let entry = document.createElement('div');
        entry.innerText = "[" + time + "] " + type + (reason ? ": " + reason : "");
        document.getElementById('log').prepend(entry);

        // 4. Update Bar
        let total = count.NO + count.SILENCE + count.SORRY + count.WARD;
        document.getElementById('bar-fill').style.width = Math.min((total / 10) * 100, 100) + "%";
    }

    // Clock
    setInterval(() => {
        let diff = new Date(Date.now() - start);
        document.getElementById('clock').innerText = diff.toISOString().substr(11, 8);
    }, 1000);
</script>
</body>
</html>

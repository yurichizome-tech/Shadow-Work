<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grimoire Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="main-tabs">
        <button onclick="openBranch('garden')">My Garden</button>
        <button onclick="openBranch('torches')">Torches</button>
        <button onclick="openBranch('vault')">Locked Vault</button>
        <button onclick="openBranch('void')">The Void</button>
    </nav>

    <main id="content-display">
        <div id="garden" class="branch-content">
            <h2>My Garden</h2>
            <ul id="task-list"></ul>
        </div>

        <div id="torches" class="branch-content" style="display:none;">
            <h2>Torches</h2>
            <div class="tally-container">
                <button onclick="tally(1)">Torch 1</button>
                <button onclick="tally(2)">Torch 2</button>
                <button onclick="tally(3)">Torch 3</button>
                <button onclick="tally(4)">Torch 4</button>
            </div>
        </div>
        
        </main>

    <script src="garden.js"></script>
    <script src="torches.js"></script>
    <script src="vault.js"></script>
    <script src="void.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #b0b0b0; --accent: #ff3e3e; --gold: #c5a059; --green: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; }
        .nav { display: flex; justify-content: center; gap: 20px; padding: 20px; border-bottom: 1px solid #1a1a1a; }
        .nav-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .container { width: 90%; max-width: 800px; margin: auto; padding-top: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        .tally-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .tally-card { background: var(--panel); border: 1px solid #222; padding: 20px; text-align: center; cursor: pointer; }
        .count { display: block; font-size: 2.5rem; color: var(--green); }
        
        /* Shadow Lock Overlay - Only for the Shadow View */
        #vault-lock { background: #000; padding: 40px; text-align: center; border: 1px solid #222; margin-top: 50px; }
        textarea { width: 100%; height: 300px; background: #080000; color: var(--accent); border: 1px solid #300; padding: 15px; font-family: inherit; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="nav">
    <button id="btn-sov" class="nav-btn active" onclick="go('sovereign')">SOVEREIGNTY</button>
    <button id="btn-sha" class="nav-btn" onclick="go('shadow')">SHADOW</button>
</div>

<div class="container">
    <div id="sovereign" class="view active">
        <div id="clock" style="font-size: 2rem; text-align: center; color: var(--gold); margin-bottom: 20px;">00:00:00</div>
        <div class="tally-grid">
            <div class="tally-card" onclick="add('no')"><span id="v-no" class="count">0</span>SAID NO</div>
            <div class="tally-card" onclick="add('silence')"><span id="v-silence" class="count">0</span>SILENCE</div>
            <div class="tally-card" onclick="add('sorry')"><span id="v-sorry" class="count">0</span>NO SORRY</div>
            <div class="tally-card" onclick="add('ward')"><span id="v-ward" class="count">0</span>WARD</div>
        </div>
    </div>

    <div id="shadow" class="view">
        <div id="vault-lock">
            <h2 style="letter-spacing: 10px; color: #222;">KLEIDOUCHOS</h2>
            <input type="password" id="passInput" placeholder="Speak the Word" style="background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px; text-align: center; outline: none;">
            <button onclick="unlockVault()" style="display: block; margin: 20px auto; background: none; border: 1px solid #333; color: #555; padding: 10px 20px; cursor: pointer;">Engage</button>
        </div>
        
        <div id="vault-content" class="hidden">
            <h3 style="color: var(--accent); text-align: center;">THE VOID</h3>
            <textarea id="void-text" placeholder="Bleed here..."></textarea>
            <button onclick="burn()" style="width:100%; padding: 20px; background: #200; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; margin-top: 10px; cursor: pointer;">RELEASE TO THE VOID</button>
        </div>
    </div>
</div>

<script>
    const PASS = "Kleidouchos";
    let state = JSON.parse(localStorage.getItem('sov_state')) || { no: 0, silence: 0, sorry: 0, ward: 0, start: Date.now() };

    function go(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById(id === 'sovereign' ? 'btn-sov' : 'btn-sha').classList.add('active');
        
        // Relock the vault every time you leave the tab
        if (id !== 'shadow') {
            document.getElementById('vault-lock').classList.remove('hidden');
            document.getElementById('vault-content').classList.add('hidden');
            document.getElementById('passInput').value = "";
        }
    }

    function unlockVault() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('vault-lock').classList.add('hidden');
            document.getElementById('vault-content').classList.remove('hidden');
        } else {
            alert("The gate remains closed.");
        }
    }

    function add(key) {
        state[key]++;
        localStorage.setItem('sov_state', JSON.stringify(state));
        refresh();
    }

    function burn() {
        document.getElementById('void-text').value = "";
        alert("The crows have taken it.");
        go('sovereign');
    }

    function refresh() {
        document.getElementById('v-no').innerText = state.no;
        document.getElementById('v-silence').innerText = state.silence;
        document.getElementById('v-sorry').innerText = state.sorry;
        document.getElementById('v-ward').innerText = state.ward;
    }

    setInterval(() => {
        let diff = Date.now() - state.start;
        let h = Math.floor(diff / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);
        document.getElementById('clock').innerText = 
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }, 1000);

    window.onload = refresh;
</script>
</body>
</html>

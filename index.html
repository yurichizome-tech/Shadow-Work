<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Grimoire</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --text: #d0d0d0; --progress-bg: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Garamond', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        /* PROGRESS BAR */
        .progress-container { width: 100%; height: 5px; background: var(--progress-bg); position: fixed; top: 0; z-index: 1000; }
        #progress-bar { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 10px var(--gold); transition: width 0.5s ease; }

        /* TAB NAVIGATION */
        .tab-bar { display: flex; justify-content: space-around; width: 100%; background: #111; padding: 15px 0; border-bottom: 1px solid #222; margin-top: 5px; }
        .tab-btn { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { width: 92%; max-width: 600px; padding: 20px; display: none; }
        .container.active { display: block; }

        /* TALLIES */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .tally-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
        .tally-count { font-size: 2rem; color: var(--gold); display: block; font-weight: bold; }

        /* TRIAGE TASKS */
        .task-group { margin: 25px 0; border: 1px solid #222; padding: 15px; border-radius: 8px; position: relative; }
        .task-header { color: var(--gold); font-size: 1.1rem; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .subtask { padding: 12px; margin: 8px 0; border: 1px solid #333; background: #0a0a0a; transition: all 0.6s; cursor: pointer; color: #666; display: flex; justify-content: space-between; }
        .subtask::before { content: '⋮'; color: #333; margin-right: 10px; } /* Reorder Handle Visual */
        
        .subtask.completed { 
            color: var(--gold); border: 2px solid var(--gold); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            background: linear-gradient(45deg, #1a1a1a, #000);
            text-shadow: 0 0 8px #d4af37;
            animation: alchemicalScorch 0.5s ease-out;
        }

        /* VAULT */
        .vault-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #shadow-text { width: 85%; height: 250px; background: #0a0a0a; color: #888; border: 1px solid #222; padding: 20px; outline: none; }
        .crow-particle { position: absolute; width: 12px; height: 8px; background: #000; clip-path: polygon(0% 20%, 50% 50%, 100% 20%, 50% 100%); z-index: 2001; pointer-events: none; }
        @keyframes flyAway { to { transform: translate(var(--twx), var(--twy)) rotate(var(--tr)) scale(0); opacity: 0; } }

        .btn-gold { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 15px 30px; cursor: pointer; margin-top: 20px; letter-spacing: 3px; }
        @keyframes alchemicalScorch { 0% { filter: brightness(4); } 100% { filter: brightness(1); } }
    </style>
</head>
<body>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('daily')">TRIAGE</button>
        <button class="tab-btn" onclick="switchTab('projects')">PROJECTS</button>
        <button class="tab-btn" onclick="openVault()">VAULT</button>
    </div>

    <div id="daily" class="container active">
        <div class="grid">
            <div class="tally-card" onclick="addTally('saidNo')"><span id="count-saidNo" class="tally-count">0</span>Said No</div>
            <div class="tally-card" onclick="addTally('heldSilence')"><span id="count-heldSilence" class="tally-count">0</span>Silence Held</div>
        </div>

        <div class="task-group" id="laundry-group">
            <div class="task-header">Laundry</div>
            <div class="subtask" onclick="toggleTask(this)">Wash & Rinse</div>
            <div class="subtask" onclick="toggleTask(this)">The Hanging</div>
            <div class="subtask" onclick="toggleTask(this)">Fold & Center</div>
        </div>

        <div class="task-group" id="cupcake-group">
            <div class="task-header">Cupcakes</div>
            <div class="subtask" onclick="toggleTask(this)">The Mixing</div>
            <div class="subtask" onclick="toggleTask(this)">Fire & Bake</div>
            <div class="subtask" onclick="toggleTask(this)">Decoration</div>
        </div>
    </div>

    <div id="projects" class="container">
        <div class="task-group">
            <div class="task-header">Garden Sanctuary</div>
            <div class="subtask" onclick="toggleTask(this)">Seedling Care</div>
            <div class="subtask" onclick="toggleTask(this)">Source Hekate Key</div>
        </div>
    </div>

    <div id="vault" class="vault-overlay">
        <h2 style="color: #222; letter-spacing: 8px;">KLIDOUS</h2>
        <textarea id="shadow-text" placeholder="Release to the crows..."></textarea>
        <button class="btn-gold" onclick="feedCrows()">RELEASE</button>
        <button style="background:none; border:none; color:#333; margin-top:50px; cursor:pointer;" onclick="closeVault()">[ SEAL ]</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('sovereign_v6')) || { tallies: { saidNo: 0, heldSilence: 0 } };

        function switchTab(tabId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function toggleTask(el) { 
            el.classList.toggle('completed'); 
            updateProgress();
        }

        function updateProgress() {
            const total = document.querySelectorAll('.subtask').length;
            const done = document.querySelectorAll('.subtask.completed').length;
            const percent = (done / total) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        function addTally(key) { 
            state.tallies[key]++; 
            document.getElementById(`count-${key}`).innerText = state.tallies[key]; 
            localStorage.setItem('sovereign_v6', JSON.stringify(state)); 
        }

        function openVault() { document.getElementById('vault').style.display = 'flex'; }
        function closeVault() { document.getElementById('vault').style.display = 'none'; }

        function feedCrows() {
            const area = document.getElementById('shadow-text');
            if (!area.value) return;
            for (let i = 0; i < 40; i++) {
                const crow = document.createElement('div');
                crow.className = 'crow-particle';
                const rect = area.getBoundingClientRect();
                crow.style.left = (rect.left + Math.random() * rect.width) + 'px';
                crow.style.top = (rect.top + Math.random() * rect.height) + 'px';
                crow.style.setProperty('--twx', (Math.random() * 800 - 400) + 'px');
                crow.style.setProperty('--twy', (Math.random() * -800 - 200) + 'px');
                crow.style.setProperty('--tr', (Math.random() * 720) + 'deg');
                crow.style.animation = "flyAway 1.8s forwards ease-in";
                document.body.appendChild(crow);
                setTimeout(() => crow.remove(), 1800);
            }
            area.style.opacity = "0";
            setTimeout(() => { area.value = ""; area.style.opacity = "1"; closeVault(); }, 1500);
        }

        document.getElementById('count-saidNo').innerText = state.tallies.saidNo;
        document.getElementById('count-heldSilence').innerText = state.tallies.heldSilence;
        updateProgress();
    </script>
</body>
</html>

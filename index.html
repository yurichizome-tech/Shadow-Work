<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Grimoire</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --text: #d0d0d0; --fade: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Garamond', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        /* NAVIGATION */
        .nav-bar { display: flex; justify-content: space-around; width: 100%; background: #0a0a0a; padding: 20px 0; border-bottom: 1px solid #111; }
        .nav-btn { background: none; border: none; color: #444; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        .nav-btn.active { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        .view { width: 92%; max-width: 600px; display: none; padding-top: 20px; }
        .view.active { display: block; }

        /* THE TORCHES (TALLIES) */
        .torch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .torch-card { background: #0d0d0d; border: 1px solid #222; padding: 20px; border-radius: 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .torch-card:active { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .torch-count { font-size: 1.8rem; color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold; }

        /* MY GARDEN (TASKS) */
        .task-group { border: 1px solid #1a1a1a; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        .task-header { color: var(--gold); font-size: 1rem; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .subtask { padding: 12px; margin: 8px 0; border: 1px solid #222; background: #050505; color: #555; cursor: pointer; transition: 0.4s; }
        .subtask.completed { color: var(--gold); border-color: var(--gold); background: #0a0800; box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1); }

        /* THE VAULT ENTRANCE */
        .vault-gate { text-align: center; padding-top: 60px; }
        .key-input { background: #000; border: 1px solid #222; color: var(--gold); padding: 15px; width: 70%; text-align: center; font-family: serif; font-size: 1.1rem; outline: none; margin-bottom: 20px; }
        .keyhole-btn { 
            width: 60px; height: 90px; background: var(--gold); clip-path: polygon(50% 0%, 100% 30%, 100% 70%, 70% 70%, 70% 100%, 30% 100%, 30% 70%, 0% 70%, 0% 30%); 
            border: none; cursor: pointer; margin: 0 auto; display: block; transition: 0.3s; opacity: 0.6;
        }
        .keyhole-btn:hover { opacity: 1; transform: scale(1.05); }

        /* THE VOID */
        .void-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        #void-text { width: 85%; height: 300px; background: #050505; color: #888; border: 1px solid #111; padding: 20px; font-size: 1.2rem; outline: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showView('torches')">TORCHES</button>
        <button class="nav-btn" onclick="showView('garden')">MY GARDEN</button>
        <button class="nav-btn" onclick="showView('gate')">VAULT</button>
    </div>

    <div id="torches" class="view active">
        <div class="torch-grid">
            <div class="torch-card" onclick="upTally('no')"><span id="t-no" class="torch-count">0</span>No!</div>
            <div class="torch-card" onclick="upTally('silence')"><span id="t-silence" class="torch-count">0</span>Silence Held</div>
            <div class="torch-card" onclick="upTally('ward')"><span id="t-ward" class="torch-count">0</span>Held the Ward</div>
            <div class="torch-card" onclick="upTally('voices')"><span id="t-voices" class="torch-count">0</span>Urged by voices...</div>
        </div>
    </div>

    <div id="garden" class="view">
        <div class="task-group">
            <div class="task-header">Laundry</div>
            <div class="subtask" onclick="this.classList.toggle('completed')">Wash & Rinse</div>
            <div class="subtask" onclick="this.classList.toggle('completed')">The Hanging</div>
            <div class="subtask" onclick="this.classList.toggle('completed')">Fold & Center</div>
        </div>
        <div class="task-group">
            <div class="task-header">Cupcakes</div>
            <div class="subtask" onclick="this.classList.toggle('completed')">The Mixing</div>
            <div class="subtask" onclick="this.classList.toggle('completed')">Fire & Bake</div>
            <div class="subtask" onclick="this.classList.toggle('completed')">Decoration</div>
        </div>
    </div>

    <div id="gate" class="view vault-gate">
        <p style="color: #333; letter-spacing: 4px;">Speak the words...</p>
        <input type="password" id="pass-box" class="key-input" placeholder="...">
        <button class="keyhole-btn" onclick="checkKey()"></button>
    </div>

    <div id="void-overlay" class="void-overlay">
        <h2 style="color: #111; letter-spacing: 12px;">THE VOID</h2>
        <textarea id="void-text" placeholder="Release..."></textarea>
        <button onclick="closeVoid()" style="background:none; border:none; color:#222; cursor:pointer;">[ SEAL ]</button>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('sov_v66')) || { no:0, silence:0, ward:0, voices:0 };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function upTally(key) {
            data[key]++;
            document.getElementById(`t-${key}`).innerText = data[key];
            localStorage.setItem('sov_v66', JSON.stringify(data));
        }

        function checkKey() {
            const input = document.getElementById('pass-box').value;
            if(input.toLowerCase() === "kleidouchos") {
                document.getElementById('void-overlay').style.display = 'flex';
                document.getElementById('pass-box').value = "";
            } else {
                alert("The gate remains closed.");
                document.getElementById('pass-box').value = "";
            }
        }

        function closeVoid() {
            document.getElementById('void-overlay').style.display = 'none';
            showView('torches');
        }

        // Init
        document.getElementById('t-no').innerText = data.no;
        document.getElementById('t-silence').innerText = data.silence;
        document.getElementById('t-ward').innerText = data.ward;
        document.getElementById('t-voices').innerText = data.voices;
    </script>
</body>
</html>
